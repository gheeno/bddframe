# BDDFrame — Azure DevOps pipeline (Windows)
trigger:
  - main
  - develop

pool:
  vmImage: windows-latest

variables:
  - group: bddframe-secrets

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - script: |
      pip install bddframe
      playwright install chromium --with-deps
    displayName: Install BDDFrame

  - script: |
      bddframe run features/ --headless
    displayName: Run tests
    env:
      BASE_URL: $(BASE_URL)
      MY_EMAIL: $(MY_EMAIL)
      MY_CARD: $(MY_CARD)
      BDDFRAME_LLM_URL: $(BDDFRAME_LLM_URL)
      BDDFRAME_MODEL: $(BDDFRAME_MODEL)

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: allure-results/junit.xml
      testRunTitle: BDDFrame — $(Build.SourceBranchName)

  - task: PublishPipelineArtifact@1
    condition: always()
    inputs:
      targetPath: allure-report
      artifact: TestReport
      publishLocation: pipeline
