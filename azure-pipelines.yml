# Noodle — Azure DevOps pipeline (Linux)
trigger:
  - main
  - develop

pool:
  vmImage: ubuntu-latest

variables:
  - group: noodle-secrets   # BASE_URL, MY_EMAIL, MY_CARD, NOODLE_LLM_URL
  # Parallelism toggle. 0 = single process per shard (default — the matrix
  # already gives one .feature file per agent). Set >0 (e.g. at queue time) to
  # also run feature files multi-process *within* a job via behavex — useful
  # only when a shard runs a folder rather than a single file. Web only.
  - name: parallelProcesses
    value: 0

# Parallelism via file-level sharding (Phase E). The `discover` job lists every
# WEB .feature file and emits a dynamic matrix; the `tests` job runs one file
# per agent. Adding a .feature file auto-appears as a shard — no YAML edit.
# behave itself is single-process; parallelism comes from the agent matrix.
#
# WEB ONLY: scripts/list_features.py excludes files tagged for other platforms
# (@appium/@mobile/@desktop). Mobile/desktop suites can't shard this way — they
# need a device or host per shard — so they get their own pipeline later.
jobs:
  - job: discover
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'
      - script: |
          MATRIX=$(python scripts/list_features.py)
          echo "##vso[task.setvariable variable=matrix;isOutput=true]$MATRIX"
        name: gen
        displayName: 'Discover web feature files'

  - job: tests
    dependsOn: discover
    strategy:
      maxParallel: 4
      matrix: $[ dependencies.discover.outputs['gen.matrix'] ]

    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'

      - script: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          pip install -e ".[all]"
          playwright install chromium --with-deps
        displayName: Install Noodle

      - script: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          noodle run $(featurePath) --headless
        displayName: 'Run tests — $(featurePath)'
        env:
          BASE_URL: $(BASE_URL)
          MY_EMAIL: $(MY_EMAIL)
          MY_CARD: $(MY_CARD)
          NOODLE_LLM_URL: $(NOODLE_LLM_URL)
          NOODLE_MODEL: $(NOODLE_MODEL)
          NOODLE_PARALLEL_PROCESSES: $(parallelProcesses)   # 0 = single process
          # Optional: pull secrets from Key Vault instead of the variable group.
          # Set NOODLE_KEYVAULT_URL in the group + grant the agent identity
          # 'get'/'list' on the vault. Unset → variable-group env is used.
          NOODLE_KEYVAULT_URL: $(NOODLE_KEYVAULT_URL)

      - task: PublishTestResults@2
        condition: always()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: allure-results/junit.xml
          testRunTitle: 'Noodle — $(Build.SourceBranchName) — $(featurePath)'

      - task: PublishPipelineArtifact@1
        condition: always()
        inputs:
          targetPath: allure-report
          artifact: 'TestReport-$(System.JobName)'
          publishLocation: pipeline

      # Playwright traces for failed scenarios — open with `playwright show-trace`.
      - task: PublishPipelineArtifact@1
        condition: failed()
        inputs:
          targetPath: traces
          artifact: 'Traces-$(System.JobName)'
          publishLocation: pipeline
