# UITestingPlayground POM entries.
#
# Elements here have no stable accessible name that the accessibility tree can
# uniquely match — either the text is generic ("Start"), clashes with other
# elements, or the element is not reachable by role/label/placeholder.
#
# POM fallback fires when Playwright's accessibility strategy returns 0 matches,
# then resolves the locator from this file instead.
#
# Key rule: the POM key must match the human word used in the step sentence
# (lowercased, stripped of surrounding quotes).
#   step  "User clicks the progress start trigger"  →  key = "progress start trigger"

progress start trigger:
  id: startButton

progress bar indicator:
  id: progressBar

updating button:
  id: updatingButton

new button name input:
  id: newButtonName

login status:
  id: logInStatus

hiding button:
  css: ".scrollButton"

bad button:
  css: "button.btn-primary[onclick]"
