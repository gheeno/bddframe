# BDDFrame — Azure DevOps pipeline (Windows)
trigger:
  - main
  - develop

pool:
  vmImage: windows-latest

variables:
  - group: bddframe-secrets
  # Parallelism toggle — see the Linux pipeline. 0 = single process per shard.
  - name: parallelProcesses
    value: 0

# File-level web sharding (Phase E) — see the Linux pipeline for the full notes.
# `discover` emits a dynamic matrix of WEB .feature files; `tests` runs one per
# agent. Other platforms (@appium/@desktop) are excluded and shard elsewhere.
jobs:
  - job: discover
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'
      - powershell: |
          $matrix = python scripts/list_features.py
          Write-Host "##vso[task.setvariable variable=matrix;isOutput=true]$matrix"
        name: gen
        displayName: 'Discover web feature files'

  - job: tests
    dependsOn: discover
    strategy:
      maxParallel: 4
      matrix: $[ dependencies.discover.outputs['gen.matrix'] ]

    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'

      - script: |
          pip install -e ".[all]"
          playwright install chromium --with-deps
        displayName: Install BDDFrame

      - script: |
          bddframe run $(featurePath) --headless
        displayName: 'Run tests — $(featurePath)'
        env:
          BASE_URL: $(BASE_URL)
          MY_EMAIL: $(MY_EMAIL)
          MY_CARD: $(MY_CARD)
          BDDFRAME_LLM_URL: $(BDDFRAME_LLM_URL)
          BDDFRAME_MODEL: $(BDDFRAME_MODEL)
          BDDFRAME_PARALLEL_PROCESSES: $(parallelProcesses)   # 0 = single process
          # Optional Key Vault — see the Linux pipeline for setup notes.
          BDDFRAME_KEYVAULT_URL: $(BDDFRAME_KEYVAULT_URL)

      - task: PublishTestResults@2
        condition: always()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: allure-results/junit.xml
          testRunTitle: 'BDDFrame — $(Build.SourceBranchName) — $(featurePath)'

      - task: PublishPipelineArtifact@1
        condition: always()
        inputs:
          targetPath: allure-report
          artifact: 'TestReport-$(System.JobName)'
          publishLocation: pipeline

      # Playwright traces for failed scenarios — open with `playwright show-trace`.
      - task: PublishPipelineArtifact@1
        condition: failed()
        inputs:
          targetPath: traces
          artifact: 'Traces-$(System.JobName)'
          publishLocation: pipeline
