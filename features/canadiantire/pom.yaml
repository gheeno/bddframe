# Local POM — features/canadiantire/*.feature only. Page-scoped by URL (9.2).
#
# Why these selectors (verified against the live site):
#   - #search-input is a DUPLICATED id (hidden mobile + desktop); the visible
#     one is targeted with :visible rather than the id.
#   - the framework's fill does not submit, so a separate submit button is needed.
#   - product links are <a href*="pdp">; the first is the top result.

pages:
  home:
    match: { url_contains: "en.html" }
    searchbox:
      css: 'input[data-testid="search-input"]:visible'
    searchbutton:
      css: 'button[aria-label="Search"]:visible'

  results:
    match: { url_contains: "search-results" }
    firstresult:
      css: 'a[href*="pdp"]:visible'
    # the title text node inside the first result card. The anchor's full text
    # also includes "Best Seller"/"Options" badges + newlines, so target the
    # title element specifically for a clean, single-line capture.
    firstresulttitle:
      css: 'a[href*="pdp"]:visible [class*="title" i]'
    # second result card's title. Each product link contains the title twice
    # (mobile + desktop copies), so scope to the 2nd ANCHOR (card) first, then
    # take its title — :nth-match on the title alone would hit a duplicate.
    secondresulttitle:
      css: ':nth-match(a[href*="pdp"]:visible, 2) [class*="title" i]'
