# ============================================================================
# LOCAL POM — applies ONLY to features/fallback-demo/*.feature
#
# Only ONE entry is needed. Everything else in fallback_demo.feature resolves
# via the accessibility tree and never reaches this file.
#
# This entry exists because the saucedemo burger button is icon-only:
#   <button id="react-burger-menu-btn">Open Menu</button>   ← text is hidden
# so get_by_role / get_by_text return 0 matches for the label "burger menu".
#
# Key rule (see docs/pom-key-mapping.md):
#   step  "User clicks the burger menu"
#   → strip "User", "the"  →  POM key = "burger menu"
#
# Selector types: css | xpath | id | testid | text | role
# ============================================================================

burger menu:
  id: react-burger-menu-btn
